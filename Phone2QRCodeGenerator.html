<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phone to QR Code Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 460px;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .icon-box {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: #e8f0fe;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-box svg { width: 22px; height: 22px; color: #1a73e8; }

  .card-title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .card-sub   { font-size: 13px; color: #888; margin-top: 2px; }

  label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .input-row {
    position: relative;
    margin-bottom: 6px;
  }

  .input-prefix {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: #aaa;
    pointer-events: none;
    font-weight: 600;
  }

  input[type="tel"] {
    width: 100%;
    height: 46px;
    padding: 0 14px 0 30px;
    font-size: 15px;
    font-family: 'Courier New', monospace;
    border: 1.5px solid #dde1e7;
    border-radius: 10px;
    background: #f9fafb;
    color: #1a1a1a;
    outline: none;
    letter-spacing: 0.4px;
    transition: border-color 0.15s;
  }

  input[type="tel"]:focus { border-color: #1a73e8; background: #fff; }

  .hint {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 1.25rem;
  }

  .error-box {
    display: none;
    font-size: 13px;
    color: #c0392b;
    background: #fdecea;
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 1rem;
  }

  .btn-primary {
    width: 100%;
    height: 46px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background: #1a73e8;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-primary:hover  { background: #1558b0; }
  .btn-primary:active { transform: scale(0.98); }

  /* Result screen */
  #screen-result { display: none; }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 13px;
    color: #888;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 1.5rem;
  }
  .back-btn:hover { color: #1a73e8; }

  .qr-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  #qr-wrapper {
    padding: 18px;
    background: #fff;
    border-radius: 12px;
    border: 1.5px solid #eee;
    display: inline-block;
  }

  .phone-label {
    font-family: 'Courier New', monospace;
    font-size: 17px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }

  .scan-note {
    font-size: 20px;
	 font-weight: bold;
    color: #000;
    text-align: center;
	word-wrap: break-word;
  }

  .divider {
    border: none;
    border-top: 1px solid #f0f0f0;
    margin: 1.5rem 0 1.25rem;
  }

  .action-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .btn-action {
    height: 42px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 10px;
    border: 1.5px solid #e0e3e8;
    background: #f5f7fa;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.12s, border-color 0.12s;
  }

  .btn-action:hover  { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
  .btn-action:active { transform: scale(0.97); }

  .btn-action svg { width: 16px; height: 16px; flex-shrink: 0; }

  @media print {
    body { background: white; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- INPUT SCREEN -->
  <div id="screen-input" class="card">
    <div class="card-header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h.01M14 17h3M17 14v7M20 17h.01M20 14h.01"/>
        </svg>
      </div>
      <div>
        <p class="card-title">QR Code Generator</p>
        <p class="card-sub">Phone &amp; landline numbers</p>
      </div>
    </div>

    <label for="phone-input">Phone number with country code</label>
    <div class="input-row">
      <span class="input-prefix">+</span>
      <input id="phone-input" type="tel" placeholder="971 50 123 4567" autocomplete="tel" />
    </div>
    <p class="hint">Include the + and country code. Example: +971 50 123 4567 &nbsp;|&nbsp; +44 20 7946 0123</p>

    <div id="error-box" class="error-box">
      ⚠ <span id="error-text">Please enter a valid phone number with country code.</span>
    </div>

    <button class="btn-primary" onclick="generateQR()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h.01M14 17h3M17 14v7M20 17h.01M20 14h.01"/>
      </svg>
      Generate QR Code
    </button>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="card">
    <button class="back-btn no-print" onclick="resetForm()">
      ← Enter a new number
    </button>

    <div class="qr-center">
      <div id="qr-wrapper">
        <div id="qr-canvas"></div>
      </div>
      <p id="phone-display" class="phone-label" style="display:none;"></p>
      <p class="scan-note">Scan with any camera app to call this number</p>
    </div>

    <hr class="divider no-print" />

    <div class="no-print">
      <p class="action-label">Save or print</p>
      <div class="action-grid">
        <button class="btn-action" onclick="saveAs('png')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save PNG
        </button>
        <button class="btn-action" onclick="saveAs('jpg')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save JPG
        </button>
        <button class="btn-action" onclick="printQR()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
      </div>
    </div>
  </div>

</div>

<script>
let currentPhone = '';

function generateQR() {
  const raw = document.getElementById('phone-input').value.trim();
  const errBox  = document.getElementById('error-box');
  const errText = document.getElementById('error-text');

  // Clean the number
  const digits  = raw.replace(/[\s\-\(\)\.]/g, '');
  let cleaned;
  if (digits.startsWith('+')) {
    cleaned = digits;
  } else if (digits.startsWith('00')) {
    cleaned = '+' + digits.slice(2);
  } else if (/^\d{7,}$/.test(digits)) {
    // No country code prefix — warn
    errText.textContent = 'Please include your country code, e.g. +971 50 123 4567.';
    errBox.style.display = 'block';
    return;
  } else {
    cleaned = null;
  }

  if (!cleaned || cleaned.replace(/\D/g,'').length < 7) {
    errText.textContent = 'Please enter a valid phone number with country code.';
    errBox.style.display = 'block';
    return;
  }

  errBox.style.display = 'none';
  currentPhone = cleaned;

  // Switch screens
  document.getElementById('screen-input').style.display  = 'none';
  document.getElementById('screen-result').style.display = 'block';
  document.getElementById('phone-display').textContent   = cleaned;

  // Render QR
  const container = document.getElementById('qr-canvas');
  container.innerHTML = '';
  new QRCode(container, {
    text: 'tel:' + cleaned,
    width: 220,
    height: 220,
    colorDark:  '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}

function resetForm() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-input').style.display  = 'block';
  document.getElementById('phone-input').value = '';
  document.getElementById('qr-canvas').innerHTML = '';
  currentPhone = '';
}

function getQRImage() {
  // qrcodejs renders a <canvas> in most browsers, <img> as fallback
  return document.querySelector('#qr-canvas canvas') ||
         document.querySelector('#qr-canvas img');
}

function saveAs(format) {
 const qr = getQRImage();
    if (!qr) return;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 1000;
    canvas.height = 1200;

    // White background
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Header text
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SCAN TO CALL', canvas.width / 2, 120);

    function finish(qrImage) {

        // QR Code
        ctx.drawImage(qrImage, 200, 220, 600, 600);

        // Footer text
        ctx.font = 'bold 24px Arial';
        ctx.fillText('Scan with any camera app', canvas.width / 2, 900);

        const mime =
            format === 'jpg'
                ? 'image/jpeg'
                : 'image/png';

        const ext =
            format === 'jpg'
                ? 'jpg'
                : 'png';

        const link = document.createElement('a');
        link.href = canvas.toDataURL(mime, 1.0);
        link.download = 'QR-Code.' + ext;
        link.click();
    }

    if (qr.tagName === 'CANVAS') {

        const img = new Image();

        img.onload = function () {
            finish(img);
        };

        img.src = qr.toDataURL('image/png');

    } else {

        const img = new Image();

        img.onload = function () {
            finish(img);
        };

        img.src = qr.src;
    }
}

  function download(canvas) {
    const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
    const ext  = format === 'jpg' ? 'jpg' : 'png';
    const url  = canvas.toDataURL(mime, 0.97);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'qr-' + currentPhone.replace(/\+/g,'') + '.' + ext;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  if (el.tagName === 'IMG') {
    const img   = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { ctx.drawImage(img, 0, 0, size, size); download(out); };
    img.src     = el.src;
  } else {
    ctx.drawImage(el, 0, 0, size, size);
    download(out);
  }
function printQR() {
  const el = getQRImage();
  if (!el) return;

  let imgSrc = '';
  if (el.tagName === 'CANVAS') {
    imgSrc = el.toDataURL('image/png');
  } else {
    imgSrc = el.src;
  }

  const win = window.open('', '_blank', 'width=480,height=580');
  if (!win) { alert('Please allow pop-ups to print.'); return; }

  win.document.write(`<!DOCTYPE html>
<html><head><title>QR Code — ${currentPhone}</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; background: #fff; }
  img  { width: 280px; height: 280px; display: block; }
  .ph  { font-family: monospace; font-size: 18px; font-weight: 700; margin-top: 16px; }
  .note{ font-size: 13px; color: #888; margin-top: 6px; }
  @media print { body { justify-content: flex-start; padding-top: 40px; } }
</style></head>
<body>
  <img src="${imgSrc}" alt="QR code for ${currentPhone}" />
  <p class="ph">${currentPhone}</p>
  <p class="note">Scan to call</p>
  <script>window.onload = function(){ setTimeout(function(){ window.print(); }, 300); }<\/script>
</body></html>`);
  win.document.close();
}

// Allow Enter key to trigger
document.getElementById('phone-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generateQR();
});
</script>
</body>
</html>
